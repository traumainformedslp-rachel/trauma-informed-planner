<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trauma-Informed Activity Planner | RTN Communication & Literacy</title>
    <meta name="description" content="Adapt classroom and therapy activities through a trauma-informed lens using SAMHSA principles, DIR/Floortime model, and sensory processing considerations." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@300;400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
      (function(){
        try {
          var saved = localStorage.getItem('rtn-theme');
          document.documentElement.setAttribute('data-theme', saved === 'dark' ? 'dark' : 'light');
        } catch(e){ document.documentElement.setAttribute('data-theme', 'light'); }
      })();
    </script>
  </head>
  <body>
    <div class="rainbow-bar" aria-hidden="true" style="height:6px;width:100%;background:linear-gradient(90deg,#8dd4b0 0%,#b8a0d8 50%,#f4b5c5 100%);position:fixed;top:0;left:0;right:0;z-index:9999;"></div>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
